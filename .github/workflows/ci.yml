name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust check, lint, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check Rust
        run: cargo check --all-features

      - name: Lint Rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Rust
        run: cargo test --all-features

  admin-ui:
    name: Admin UI build and check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: admin-ui/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install admin UI dependencies
        run: bun install --cwd admin-ui --frozen-lockfile

      - name: Check admin UI
        run: bun run --cwd admin-ui check

      - name: Test admin UI unit controllers
        run: bun run --cwd admin-ui test:unit

      - name: Build admin UI
        run: bun run --cwd admin-ui build

      - name: Check admin UI bundle size budget
        run: |
          budget=179200 # 175 KiB per JS chunk; catches lost view code-splitting
          max=$(find admin-ui/build/assets -name '*.js' -printf '%s\n' | sort -nr | head -1)
          echo "Largest JS chunk: ${max} bytes (budget ${budget})"
          if [ "${max}" -gt "${budget}" ]; then
            echo "::error::A JS chunk exceeds the ${budget}-byte budget; check for lost code-splitting."
            exit 1
          fi

      - name: Install Playwright browser
        working-directory: admin-ui
        run: bunx playwright install --with-deps chromium

      - name: Test admin UI mobile flows
        run: bun run --cwd admin-ui test:e2e --project=mobile

  deploy:
    name: Installer and updater fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check deploy script syntax and style
        run: |
          bash -n deploy/pi-release/install-on-pi deploy/pi-release/install-latest deploy/pi-release/test-install-on-pi-wifi deploy/pi-admin-caddy/tcube-update-run deploy/pi-admin-caddy/test-tcube-update-run
          shellcheck deploy/pi-release/install-on-pi deploy/pi-release/install-latest deploy/pi-release/test-install-on-pi-wifi deploy/pi-admin-caddy/tcube-update-run deploy/pi-admin-caddy/test-tcube-update-run

      - name: Test installer and updater fixtures
        run: just test-pi-installer
