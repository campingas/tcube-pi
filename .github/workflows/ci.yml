name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust check, lint, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check Rust
        run: cargo check --all-features

      - name: Lint Rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Rust
        run: cargo test --all-features

  admin-ui:
    name: Admin UI build and check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: admin-ui/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: admin-ui/pnpm-lock.yaml

      - name: Install admin UI dependencies
        run: pnpm --dir admin-ui install --frozen-lockfile

      - name: Check admin UI
        run: pnpm --dir admin-ui run check

      - name: Test admin UI unit controllers
        run: pnpm --dir admin-ui run test:unit

      - name: Build admin UI
        run: pnpm --dir admin-ui run build
