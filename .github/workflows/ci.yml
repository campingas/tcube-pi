name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust check, lint, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check Rust
        run: cargo check --all-features

      - name: Lint Rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Rust
        run: cargo test --all-features

  admin-ui:
    name: Admin UI build and check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: admin-ui/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install admin UI dependencies
        run: bun install --cwd admin-ui --frozen-lockfile

      - name: Check admin UI
        run: bun run --cwd admin-ui check

      - name: Test admin UI unit controllers
        run: bun run --cwd admin-ui test:unit

      - name: Build admin UI
        run: bun run --cwd admin-ui build
