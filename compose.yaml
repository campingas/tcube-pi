services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: tcube-pi-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    tty: true
    stdin_open: true

volumes:
  cargo-cache:
  target-cache:
