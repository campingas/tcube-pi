<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1" />
      <feGaussianBlur stdDeviation="30" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <radialGradient id="squareGradient" cx="45%" cy="40%" r="60%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#FFDDDD" /> <stop offset="25%" stop-color="#FF6B6B" /> <stop offset="70%" stop-color="#E91E63" /> <stop offset="100%" stop-color="#880E4F" /> </radialGradient>

    <linearGradient id="innerGelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#E91E63" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="glossHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    @keyframes pulseGlow {
      0% {
        transform: scale(1);
        filter: url(#pinkGlow) drop-shadow(0 0 20px rgba(233, 30, 99, 0.6));
      }
      50% {
        transform: scale(1.02);
        filter: url(#pinkGlow) drop-shadow(0 0 40px rgba(255, 107, 107, 0.9));
      }
      100% {
        transform: scale(1);
        filter: url(#pinkGlow) drop-shadow(0 0 20px rgba(233, 30, 99, 0.6));
      }
    }

    .square-body {
      transform-origin: 250px 250px;
      animation: pulseGlow 4s ease-in-out infinite;
    }

    .eye {
      fill: #260A1F; /* Very deep pink/brown */
    }

    .mouth {
      stroke: #260A1F;
      stroke-width: 7;
      stroke-linecap: round;
      fill: none;
    }

    .blush {
      fill: #FFEB3B; /* Yellow blush from original for contrast and cuteness */
      opacity: 0.4;
      filter: blur(5px);
    }
  </style>

  <rect width="100%" height="100%" fill="#1A0510" opacity="0.1" rx="15"/>

  <g class="square-body">
    
    <rect x="60" y="60" width="380" height="380" rx="40" fill="url(#squareGradient)" />

    <path d="M 120 120 
             C 170 100, 330 100, 380 120 
             C 410 140, 420 330, 380 380 
             C 330 420, 170 420, 120 380 
             C 90 330, 90 140, 120 120 Z" 
          fill="url(#innerGelGrad)" 
          opacity="0.4" />

    <path d="M 140 100 
             C 210 80, 290 80, 360 100
             L 340 140
             C 280 120, 220 120, 160 140 Z" 
          fill="url(#glossHighlight)" />

    <circle cx="160" cy="275" r="24" class="blush" />
    <circle cx="340" cy="275" r="24" class="blush" />

    <circle cx="185" cy="245" r="15" class="eye" />
    <circle cx="315" cy="245" r="15" class="eye" />
    
    <circle cx="181" cy="239" r="5" fill="#FFFFFF" />
    <circle cx="311" cy="239" r="5" fill="#FFFFFF" />
    <circle cx="189" cy="249" r="2" fill="#FFFFFF" />
    <circle cx="319" cy="249" r="2" fill="#FFFFFF" />

    <path d="M 225 265 Q 250 295, 275 265" class="mouth" />
  </g>
</svg>