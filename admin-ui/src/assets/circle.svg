<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1" />
      <feGaussianBlur stdDeviation="30" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <radialGradient id="circleGradient" cx="45%" cy="40%" r="60%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#A0E9FF" />
      <stop offset="25%" stop-color="#3A86FF" />
      <stop offset="70%" stop-color="#6A00F4" />
      <stop offset="100%" stop-color="#2D0066" />
    </radialGradient>

    <linearGradient id="innerJellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#6A00F4" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="glossHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    @keyframes pulseGlow {
      0% {
        transform: scale(1);
        filter: url(#blueGlow) drop-shadow(0 0 20px rgba(58, 134, 255, 0.6));
      }
      50% {
        transform: scale(1.02);
        filter: url(#blueGlow) drop-shadow(0 0 40px rgba(131, 56, 236, 0.9));
      }
      100% {
        transform: scale(1);
        filter: url(#blueGlow) drop-shadow(0 0 20px rgba(58, 134, 255, 0.6));
      }
    }

    .circle-body {
      transform-origin: 250px 250px;
      animation: pulseGlow 4s ease-in-out infinite;
    }

    .eye {
      fill: #0F051D;
    }

    .mouth {
      stroke: #0F051D;
      stroke-width: 7;
      stroke-linecap: round;
      fill: none;
    }

    .blush {
      fill: #FF3366;
      opacity: 0.4;
      filter: blur(5px);
    }
  </style>

  <rect width="100%" height="100%" fill="#0B031A" opacity="0.1" rx="15"/>

  <g class="circle-body">
    
    <circle cx="250" cy="250" r="190" fill="url(#circleGradient)" />

    <path d="M 250 70 
             C 320 65, 420 130, 425 210 
             C 430 290, 360 410, 280 425 
             C 200 440, 80 390, 75 300 
             C 70 210, 150 110, 250 70 Z" 
          fill="url(#innerJellyGrad)" 
          opacity="0.4" />

    <path d="M 120 140 
             A 170 170 0 0 1 380 140 
             A 180 150 0 0 0 120 140 Z" 
          fill="url(#glossHighlight)" />

    <circle cx="160" cy="275" r="24" class="blush" />
    <circle cx="340" cy="275" r="24" class="blush" />

    <circle cx="185" cy="245" r="15" class="eye" />
    <circle cx="315" cy="245" r="15" class="eye" />
    
    <circle cx="181" cy="239" r="5" fill="#FFFFFF" />
    <circle cx="311" cy="239" r="5" fill="#FFFFFF" />
    <circle cx="189" cy="249" r="2" fill="#FFFFFF" />
    <circle cx="319" cy="249" r="2" fill="#FFFFFF" />

    <path d="M 225 265 Q 250 295, 275 265" class="mouth" />
  </g>
</svg>