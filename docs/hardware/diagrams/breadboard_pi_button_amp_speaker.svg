<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 806" width="100%" role="img" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>Breadboard wiring: Pi Zero 2 W, MKE-M02 button, MAX98357A amplifier, speaker</title>
  <desc>Wiring diagram showing a Raspberry Pi Zero 2 W 40-pin header connected to one MKE-M02 button module (3V3 on pin 1, GND on pin 9, SIG on pin 11 GPIO17) and a MAX98357A I2S amplifier on a breadboard (VIN 5V pin 2, GND pin 6, SD GPIO4 pin 7, BCLK GPIO18 pin 12, LRC GPIO19 pin 35, DIN GPIO21 pin 40), with a 3 watt 8 ohm speaker on the amplifier screw terminals.</desc>

  <!-- background -->
  <rect x="0" y="0" width="960" height="806" fill="#f7f6f1"/>

  <!-- titles -->
  <text x="48" y="38" font-size="17" font-weight="600" fill="#26251f">Breadboard wiring · Pi Zero 2 W + MKE-M02 button + MAX98357A + speaker</text>
  <text x="48" y="60" font-size="12" fill="#6b6a63">Pin numbers are the physical numbers on the 40-pin header. Full pin reference: pinout.xyz</text>

  <!-- ==================== breadboard ==================== -->
  <g>
    <rect x="430" y="430" width="350" height="300" rx="8" fill="#efeee8" stroke="#c9c7bc"/>
    <text x="772" y="448" font-size="10" fill="#8a887d" text-anchor="end">830-point breadboard</text>
    <!-- power rails -->
    <line x1="446" y1="470" x2="764" y2="470" stroke="#d5604e" stroke-width="3"/>
    <line x1="446" y1="492" x2="764" y2="492" stroke="#4a7bd5" stroke-width="3"/>
    <text x="438" y="475" font-size="13" font-weight="700" fill="#d5604e" text-anchor="end">+</text>
    <text x="438" y="497" font-size="13" font-weight="700" fill="#4a7bd5" text-anchor="end">&#8722;</text>
    <text x="770" y="475" font-size="10" fill="#d5604e">5V rail</text>
    <text x="770" y="497" font-size="10" fill="#4a7bd5">GND rail</text>
    <!-- hint of holes -->
    <g fill="#c9c7bc" opacity="0.55">
      <circle cx="450" cy="520" r="1.6"/><circle cx="465" cy="520" r="1.6"/><circle cx="480" cy="520" r="1.6"/><circle cx="495" cy="520" r="1.6"/><circle cx="510" cy="520" r="1.6"/><circle cx="525" cy="520" r="1.6"/><circle cx="540" cy="520" r="1.6"/>
      <circle cx="450" cy="537" r="1.6"/><circle cx="465" cy="537" r="1.6"/><circle cx="480" cy="537" r="1.6"/><circle cx="495" cy="537" r="1.6"/><circle cx="510" cy="537" r="1.6"/><circle cx="525" cy="537" r="1.6"/><circle cx="540" cy="537" r="1.6"/>
      <circle cx="450" cy="554" r="1.6"/><circle cx="465" cy="554" r="1.6"/><circle cx="480" cy="554" r="1.6"/><circle cx="495" cy="554" r="1.6"/><circle cx="510" cy="554" r="1.6"/><circle cx="525" cy="554" r="1.6"/><circle cx="540" cy="554" r="1.6"/>
      <circle cx="450" cy="571" r="1.6"/><circle cx="465" cy="571" r="1.6"/><circle cx="480" cy="571" r="1.6"/><circle cx="495" cy="571" r="1.6"/><circle cx="525" cy="571" r="1.6"/><circle cx="540" cy="571" r="1.6"/>
      <circle cx="450" cy="640" r="1.6"/><circle cx="465" cy="640" r="1.6"/><circle cx="480" cy="640" r="1.6"/><circle cx="495" cy="640" r="1.6"/><circle cx="510" cy="640" r="1.6"/><circle cx="525" cy="640" r="1.6"/><circle cx="540" cy="640" r="1.6"/>
      <circle cx="450" cy="657" r="1.6"/><circle cx="465" cy="657" r="1.6"/><circle cx="480" cy="657" r="1.6"/><circle cx="495" cy="657" r="1.6"/><circle cx="510" cy="657" r="1.6"/><circle cx="525" cy="657" r="1.6"/><circle cx="540" cy="657" r="1.6"/>
      <circle cx="730" cy="520" r="1.6"/><circle cx="745" cy="520" r="1.6"/><circle cx="760" cy="520" r="1.6"/>
      <circle cx="730" cy="537" r="1.6"/><circle cx="745" cy="537" r="1.6"/><circle cx="760" cy="537" r="1.6"/>
      <circle cx="730" cy="554" r="1.6"/><circle cx="745" cy="554" r="1.6"/><circle cx="760" cy="554" r="1.6"/>
      <circle cx="730" cy="690" r="1.6"/><circle cx="745" cy="690" r="1.6"/><circle cx="760" cy="690" r="1.6"/>
      <circle cx="730" cy="707" r="1.6"/><circle cx="745" cy="707" r="1.6"/><circle cx="760" cy="707" r="1.6"/>
    </g>
  </g>

  <!-- ==================== wires (drawn first, under components) ==================== -->
  <g fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 5V: pin 2 to red rail -->
    <path d="M208,104 H246 V470 H446" stroke="#d5604e"/>
    <!-- GND: pin 6 to blue rail -->
    <path d="M208,162 H232 V492 H446" stroke="#3a3a37"/>
    <!-- 3V3: pin 1 to button VCC -->
    <path d="M178,107 L206,122 H340 V128 H458" stroke="#e8923a"/>
    <!-- button GND: pin 9 -->
    <path d="M180,220 H388 V188 H458" stroke="#3a3a37"/>
    <!-- button SIG: pin 11 GPIO17 -->
    <path d="M180,249 H372 V158 H458" stroke="#8a8f98"/>
    <!-- SD: pin 7 GPIO4 to amp SD -->
    <path d="M180,191 H260 V616 H550" stroke="#7d5bd0"/>
    <!-- BCLK: pin 12 GPIO18 -->
    <path d="M206,252 L230,266 H276 V660 H550" stroke="#d9a824"/>
    <!-- LRC: pin 35 GPIO19 -->
    <path d="M180,597 H292 V682 H550" stroke="#3f9e63"/>
    <!-- DIN: pin 40 GPIO21 -->
    <path d="M200,663 V704 H550" stroke="#4a7bd5"/>
    <!-- amp VIN to red rail -->
    <path d="M550,572 H510 V470" stroke="#d5604e"/>
    <!-- amp GND to blue rail -->
    <path d="M550,594 H496 V492" stroke="#3a3a37"/>
    <!-- speaker wires -->
    <path d="M728,616 H792" stroke="#d5604e"/>
    <path d="M728,644 H792" stroke="#3a3a37"/>
  </g>

  <!-- ==================== Raspberry Pi ==================== -->
  <g>
    <rect x="48" y="84" width="176" height="592" rx="10" fill="#356a48" stroke="#274d35"/>
    <text transform="rotate(-90 66 380)" x="66" y="380" font-size="13" font-weight="600" fill="#cfe0d4" text-anchor="middle">Raspberry Pi Zero 2 W</text>
    <!-- header block -->
    <rect x="158" y="92" width="56" height="576" rx="4" fill="#23221f"/>
    <!-- pin 1 marker -->
    <rect x="165" y="97" width="14" height="14" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <text x="150" y="78" font-size="11" fill="#26251f" text-anchor="middle">pin 1</text>
    <line x1="155" y1="81" x2="168" y2="96" stroke="#26251f" stroke-width="1"/>
    <text x="212" y="78" font-size="11" fill="#26251f" text-anchor="middle">pin 2</text>
    <line x1="207" y1="81" x2="201" y2="96" stroke="#26251f" stroke-width="1"/>
    <text x="240" y="688" font-size="11" fill="#26251f">pin 40</text>
    <line x1="238" y1="684" x2="207" y2="662" stroke="#26251f" stroke-width="1"/>

    <!-- all 40 pins: odd column x=172, even column x=200, rows every 29px from y=104 -->
    <g fill="#d9b64a" stroke="#8a6d1f" stroke-width="0.8">
      <circle cx="172" cy="104" r="5"/><circle cx="200" cy="104" r="5"/>
      <circle cx="172" cy="133" r="5"/><circle cx="200" cy="133" r="5"/>
      <circle cx="172" cy="162" r="5"/><circle cx="200" cy="162" r="5"/>
      <circle cx="172" cy="191" r="5"/><circle cx="200" cy="191" r="5"/>
      <circle cx="172" cy="220" r="5"/><circle cx="200" cy="220" r="5"/>
      <circle cx="172" cy="249" r="5"/><circle cx="200" cy="249" r="5"/>
      <circle cx="172" cy="278" r="5"/><circle cx="200" cy="278" r="5"/>
      <circle cx="172" cy="307" r="5"/><circle cx="200" cy="307" r="5"/>
      <circle cx="172" cy="336" r="5"/><circle cx="200" cy="336" r="5"/>
      <circle cx="172" cy="365" r="5"/><circle cx="200" cy="365" r="5"/>
      <circle cx="172" cy="394" r="5"/><circle cx="200" cy="394" r="5"/>
      <circle cx="172" cy="423" r="5"/><circle cx="200" cy="423" r="5"/>
      <circle cx="172" cy="452" r="5"/><circle cx="200" cy="452" r="5"/>
      <circle cx="172" cy="481" r="5"/><circle cx="200" cy="481" r="5"/>
      <circle cx="172" cy="510" r="5"/><circle cx="200" cy="510" r="5"/>
      <circle cx="172" cy="539" r="5"/><circle cx="200" cy="539" r="5"/>
      <circle cx="172" cy="568" r="5"/><circle cx="200" cy="568" r="5"/>
      <circle cx="172" cy="597" r="5"/><circle cx="200" cy="597" r="5"/>
      <circle cx="172" cy="626" r="5"/><circle cx="200" cy="626" r="5"/>
      <circle cx="172" cy="655" r="5"/><circle cx="200" cy="655" r="5"/>
    </g>

    <!-- connection dots on used pins -->
    <circle cx="172" cy="104" r="3" fill="#e8923a"/>
    <circle cx="200" cy="104" r="3" fill="#d5604e"/>
    <circle cx="200" cy="162" r="3" fill="#3a3a37"/>
    <circle cx="172" cy="191" r="3" fill="#7d5bd0"/>
    <circle cx="172" cy="220" r="3" fill="#3a3a37"/>
    <circle cx="172" cy="249" r="3" fill="#8a8f98"/>
    <circle cx="200" cy="249" r="3" fill="#d9a824"/>
    <circle cx="172" cy="597" r="3" fill="#3f9e63"/>
    <circle cx="200" cy="655" r="3" fill="#4a7bd5"/>

    <!-- used pin labels -->
    <g font-size="10.5" fill="#ffffff" text-anchor="end">
      <text x="160" y="101">3V3 &#183; 1</text>
      <text x="160" y="124">5V &#183; 2</text>
      <text x="160" y="166">GND &#183; 6</text>
      <text x="160" y="187">GPIO4 &#183; 7</text>
      <text x="160" y="224">GND &#183; 9</text>
      <text x="160" y="245">GPIO17 &#183; 11</text>
      <text x="160" y="268">GPIO18 &#183; 12</text>
      <text x="160" y="601">GPIO19 &#183; 35</text>
      <text x="160" y="644">GPIO21 &#183; 40</text>
    </g>
    <g stroke="#ffffff" stroke-width="0.9" stroke-dasharray="2 2">
      <line x1="163" y1="120" x2="194" y2="107"/>
      <line x1="163" y1="163" x2="193" y2="162"/>
      <line x1="163" y1="264" x2="194" y2="253"/>
      <line x1="163" y1="641" x2="193" y2="652"/>
    </g>
  </g>

  <!-- ==================== MKE-M02 button module ==================== -->
  <g>
    <text x="560" y="88" font-size="12" font-weight="600" fill="#26251f" text-anchor="middle">MKE-M02 button module (any colour)</text>
    <rect x="470" y="96" width="180" height="132" rx="10" fill="#27567b" stroke="#1b3c57"/>
    <circle cx="575" cy="162" r="34" fill="#b9bcc2"/>
    <circle cx="575" cy="162" r="27" fill="#c94a42"/>
    <circle cx="575" cy="162" r="27" fill="none" stroke="#8f2f29" stroke-width="2"/>
    <!-- pins -->
    <g fill="#d9b64a" stroke="#8a6d1f" stroke-width="0.8">
      <rect x="458" y="122" width="12" height="12"/>
      <rect x="458" y="152" width="12" height="12"/>
      <rect x="458" y="182" width="12" height="12"/>
    </g>
    <g font-size="11" font-weight="600" fill="#ffffff">
      <text x="478" y="132">VCC</text>
      <text x="478" y="162">SIG</text>
      <text x="478" y="192">GND</text>
    </g>
    <text x="560" y="246" font-size="10" fill="#6b6a63" text-anchor="middle">Pin order varies. Always follow the letters printed on your module.</text>
  </g>

  <!-- ==================== MAX98357A amplifier ==================== -->
  <g>
    <text x="630" y="540" font-size="12" font-weight="600" fill="#26251f" text-anchor="middle">MAX98357A &#183; I2S 3 W amp</text>
    <rect x="556" y="548" width="154" height="172" rx="6" fill="#7a2437" stroke="#541726"/>
    <!-- left pins -->
    <g fill="#d9b64a" stroke="#8a6d1f" stroke-width="0.8">
      <rect x="550" y="566" width="12" height="12"/>
      <rect x="550" y="588" width="12" height="12"/>
      <rect x="550" y="610" width="12" height="12"/>
      <rect x="550" y="632" width="12" height="12"/>
      <rect x="550" y="654" width="12" height="12"/>
      <rect x="550" y="676" width="12" height="12"/>
      <rect x="550" y="698" width="12" height="12"/>
    </g>
    <g font-size="10" font-weight="600" fill="#ffffff">
      <text x="570" y="576">VIN</text>
      <text x="570" y="598">GND</text>
      <text x="570" y="620">SD</text>
      <text x="570" y="642">GAIN &#183; leave empty</text>
      <text x="570" y="664">BCLK</text>
      <text x="570" y="686">LRC</text>
      <text x="570" y="708">DIN</text>
    </g>
    <!-- screw terminal -->
    <rect x="702" y="600" width="26" height="60" rx="3" fill="#2e8f8f" stroke="#1d6363"/>
    <circle cx="715" cy="616" r="6" fill="#1d6363"/>
    <circle cx="715" cy="644" r="6" fill="#1d6363"/>
    <text x="736" y="606" font-size="10" fill="#26251f">SPK+</text>
    <text x="736" y="662" font-size="10" fill="#26251f">SPK&#8722;</text>
  </g>

  <!-- ==================== speaker ==================== -->
  <g>
    <text x="859" y="532" font-size="12" font-weight="600" fill="#26251f" text-anchor="middle">Mini 3 W 8 &#937; speaker</text>
    <rect x="800" y="540" width="118" height="150" rx="10" fill="#3a3a37" stroke="#26251f"/>
    <circle cx="859" cy="615" r="46" fill="#57544d"/>
    <circle cx="859" cy="615" r="28" fill="#6e6a62"/>
    <circle cx="859" cy="615" r="10" fill="#8a867d"/>
    <g fill="#d9b64a" stroke="#8a6d1f" stroke-width="0.8">
      <rect x="792" y="610" width="12" height="12"/>
      <rect x="792" y="638" width="12" height="12"/>
    </g>
  </g>

  <!-- ==================== legend ==================== -->
  <g>
    <rect x="48" y="742" width="872" height="52" rx="8" fill="#efeee8" stroke="#c9c7bc"/>
    <g stroke-width="4" stroke-linecap="round">
      <line x1="64" y1="758" x2="86" y2="758" stroke="#d5604e"/>
      <line x1="264" y1="758" x2="286" y2="758" stroke="#3a3a37"/>
      <line x1="464" y1="758" x2="486" y2="758" stroke="#e8923a"/>
      <line x1="664" y1="758" x2="686" y2="758" stroke="#8a8f98"/>
      <line x1="64" y1="780" x2="86" y2="780" stroke="#7d5bd0"/>
      <line x1="264" y1="780" x2="286" y2="780" stroke="#d9a824"/>
      <line x1="464" y1="780" x2="486" y2="780" stroke="#3f9e63"/>
      <line x1="664" y1="780" x2="686" y2="780" stroke="#4a7bd5"/>
    </g>
    <g font-size="11" fill="#26251f">
      <text x="92" y="762">5 V power (pin 2)</text>
      <text x="292" y="762">Ground (pins 6, 9)</text>
      <text x="492" y="762">3.3 V power (pin 1)</text>
      <text x="692" y="762">Button SIG &#8594; GPIO17 (pin 11)</text>
      <text x="92" y="784">Amp SD &#8594; GPIO4 (pin 7)</text>
      <text x="292" y="784">I2S BCLK &#8594; GPIO18 (pin 12)</text>
      <text x="492" y="784">I2S LRC &#8594; GPIO19 (pin 35)</text>
      <text x="692" y="784">I2S DIN &#8594; GPIO21 (pin 40)</text>
    </g>
  </g>
</svg>
